[package]
name = "catbox-rs"
version = "0.8.0"
edition = "2024"
readme = "README.md"
#license = "GPL-3"
license-file = "LICENSE"
repository = "https://github.com/CoffeeCatRailway/catbox-rs"
homepage = "https://github.com/CoffeeCatRailway/catbox-rs"
publish = false

[dependencies]
sdl3 = { version = "0.17.3", features = ["build-from-source"] }
glow = "0.16.0"
glam = "0.32.0"
bytemuck = { version = "1.25.0", features = ["derive"] }

#glutin = "0.32.3"
#glutin-winit = "0.5.0"
#winit = { version = "0.30.12", features = ["rwh_06"] }
#winit_input_helper = "0.17.0"
#raw-window-handle = "0.6.2"

dear-imgui-rs = { version = "0.10.2", features = ["glam"] }
dear-imgui-sdl3 = "0.10.2"
dear-imgui-glow = "0.10.2"

tracing = "0.1.44"
tracing-subscriber = "0.3.22"
#log = "0.4.29"
